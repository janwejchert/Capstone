<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Inter, Helvetica, Arial, sans-serif">
  <desc>Reflexive feedback loop: forecast, adopter demand, price impact mu D_t, realised return r_{t+1}. The realised return feeds back into the next forecast. The same forecast is scored two ways: against the realised return (blue, rises) and against the demand-adjusted return x = r - mu D (red, falls).</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1F4E79"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1B6FC4"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- forward chain: forecast -> adopter demand -> price impact -> realised return -->
  <g>
    <rect x="24" y="210" rx="14" ry="14" width="200" height="92" fill="#F5F8FB" stroke="#1F4E79" stroke-width="2"/>
    <text x="124" y="250" text-anchor="middle" font-size="26" fill="#1A1A1A">forecast</text>
    <text x="124" y="282" text-anchor="middle" font-size="22" fill="#5B6670">r&#770;<tspan font-size="15" dy="6">t+1</tspan></text>
  </g>
  <g>
    <rect x="272" y="210" rx="14" ry="14" width="200" height="92" fill="#F5F8FB" stroke="#1F4E79" stroke-width="2"/>
    <text x="372" y="250" text-anchor="middle" font-size="26" fill="#1A1A1A">adopter demand</text>
    <text x="372" y="282" text-anchor="middle" font-size="22" fill="#5B6670">q<tspan font-size="15" dy="6">i,t</tspan></text>
  </g>
  <g>
    <rect x="520" y="210" rx="14" ry="14" width="200" height="92" fill="#F5F8FB" stroke="#1F4E79" stroke-width="2"/>
    <text x="620" y="250" text-anchor="middle" font-size="26" fill="#1A1A1A">price impact</text>
    <text x="620" y="282" text-anchor="middle" font-size="22" fill="#1B6FC4">&#956; D<tspan font-size="15" dy="6">t</tspan></text>
  </g>
  <g>
    <rect x="768" y="210" rx="14" ry="14" width="208" height="92" fill="#F5F8FB" stroke="#1F4E79" stroke-width="2"/>
    <text x="872" y="250" text-anchor="middle" font-size="26" fill="#1A1A1A">realised return</text>
    <text x="872" y="282" text-anchor="middle" font-size="22" fill="#5B6670">r<tspan font-size="15" dy="6">t+1</tspan></text>
  </g>

  <!-- forward arrows -->
  <line x1="224" y1="256" x2="266" y2="256" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="472" y1="256" x2="514" y2="256" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="720" y1="256" x2="762" y2="256" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- reflexive feedback loop: realised return back into the next forecast -->
  <path d="M872,302 C 872,486 124,486 124,308" fill="none" stroke="#1F4E79" stroke-width="3" stroke-dasharray="2 0" marker-end="url(#arrow)"/>
  <text x="498" y="474" text-anchor="middle" font-size="22" fill="#5B6670" font-style="italic">reflexive feedback loop</text>

  <!-- blue tap: score the forecast against the realised return (rises) -->
  <line x1="872" y1="210" x2="872" y2="150" stroke="#1B6FC4" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <rect x="690" y="96" rx="10" ry="10" width="290" height="52" fill="#EAF2FB" stroke="#1B6FC4" stroke-width="2"/>
  <text x="835" y="129" text-anchor="middle" font-size="21" fill="#1B6FC4">score vs realised return (rises)</text>

  <!-- red tap: score against the demand-adjusted return, which removes the price impact (falls) -->
  <line x1="872" y1="302" x2="872" y2="364" stroke="#C62828" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#arrowRed)"/>
  <text x="900" y="338" font-size="18" fill="#C62828">remove &#956; D<tspan font-size="13" dy="5">t</tspan></text>
  <rect x="660" y="370" rx="10" ry="10" width="320" height="52" fill="#FBEAEA" stroke="#C62828" stroke-width="2"/>
  <text x="820" y="403" text-anchor="middle" font-size="21" fill="#C62828">score vs x = r - &#956; D (falls)</text>
</svg>
